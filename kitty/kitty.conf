# ╔══════════════════════════════════════════════════════════════╗
# ║              KITTY TERMINAL — KALI COMPATIBLE CONFIG         ║
# ║         Transparent · Animated Cursor · Split Windows        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── FONTS ──────────────────────────────────────────────────────
font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── CURSOR ANIMATION ───────────────────────────────────────────
cursor_shape beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# ── TRANSPARENCY ───────────────────────────────────────────────
background_opacity 0.82
background_blur 32
dynamic_background_opacity yes

# Adjust opacity on the fly
map ctrl+shift+a>m set_background_opacity +0.1
map ctrl+shift+a>l set_background_opacity -0.1
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# ── COLORS — CATPPUCCIN MOCHA ──────────────────────────────────
foreground #CDD6F4
background #000000
selection_foreground #1E1E2E
selection_background #CBA6F7

cursor #F5C2E7
cursor_text_color #1E1E2E

url_color #89B4FA

# Black
color0  #45475A
color8  #585B70
# Red
color1  #F38BA8
color9  #F38BA8
# Green
color2  #A6E3A1
color10 #A6E3A1
# Yellow
color3  #F9E2AF
color11 #F9E2AF
# Blue
color4  #89B4FA
color12 #89B4FA
# Magenta
color5  #CBA6F7
color13 #CBA6F7
# Cyan
color6  #89DCEB
color14 #89DCEB
# White
color7  #BAC2DE
color15 #A6ADC8

# ── WINDOW LAYOUT & SPLITTING ──────────────────────────────────
enabled_layouts splits,tall,fat,grid,horizontal,vertical,stack

map ctrl+shift+enter launch --cwd=current --location=hsplit
map ctrl+shift+] launch --cwd=current --location=vsplit
map ctrl+shift+[ launch --cwd=current --location=hsplit

# Navigate splits
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize splits
map ctrl+left resize_window narrower 3
map ctrl+right resize_window wider 3
map ctrl+up resize_window taller 3
map ctrl+down resize_window shorter 3

map ctrl+shift+f5 move_window_to_top
map ctrl+shift+f6 swap_with_window

# ── WINDOW APPEARANCE ──────────────────────────────────────────
window_padding_width 10
window_border_width 1.5pt
draw_minimal_borders no

active_border_color #CBA6F7
inactive_border_color #313244
bell_border_color #F38BA8

window_margin_width 4
inactive_text_alpha 0.75

# ── TABS ───────────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0

active_tab_foreground #1E1E2E
active_tab_background #CBA6F7
active_tab_font_style bold-italic
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
inactive_tab_font_style normal
tab_bar_background #11111B

tab_title_template " {index}:{title} "

map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward

# ── SCROLLBACK ─────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ── MOUSE ──────────────────────────────────────────────────────
mouse_hide_wait 2.0
click_interval 0.5
focus_follows_mouse yes
pointer_shape_when_grabbed arrow

# ── PERFORMANCE ────────────────────────────────────────────────
repaint_delay 7
input_delay 1
sync_to_monitor yes

# ── BELL ───────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.15
visual_bell_color #F38BA8

# ── ADVANCED ───────────────────────────────────────────────────
# Run: echo $SHELL   to confirm your shell path
shell /usr/bin/zsh
editor .
close_on_child_death no
allow_remote_control yes
listen_on unix:/tmp/kitty
update_check_interval 0

# ── LINUX ──────────────────────────────────────────────────────
linux_display_server auto

# ── KEYBINDS ───────────────────────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

map ctrl+shift+F5 load_config_file
map ctrl+shift+F11 toggle_fullscreen
map ctrl+shift+F10 next_layout
