# =========================
# 3-FINGER GESTURES
# =========================

gesture swipe left  3 swaymsg workspace prev
gesture swipe right 3 swaymsg workspace next

gesture swipe up    3 swaymsg exec rofi -show drun
gesture swipe down  3 swaymsg exec swaymsg focus parent

# =========================
# 4-FINGER GESTURES
# =========================

gesture swipe up    4 swaymsg fullscreen toggle
gesture swipe down  4 swaymsg exec ~/.config/rofi/menus/power.sh

# =========================
# PINCH
# =========================

gesture pinch out 2 swaymsg fullscreen toggle
gesture pinch in  2 swaymsg kill
